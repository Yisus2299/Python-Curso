{% extends "base.html" %}
{% block title %}Delete Cafe{% endblock %}

{% block content %}
<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center">
      <h1 class="h3 mb-3">Delete cafe?</h1>
      <p class="mb-4">
        Are you sure you want to delete <strong>{{ cafe.name }}</strong> in {{ cafe.location }}?
      </p>
      <form method="POST" class="d-inline">
        <button type="submit" class="btn btn-danger">Yes, delete</button>
      </form>
      <a href="{{ url_for('home') }}" class="btn btn-outline-light ms-2">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}
