<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Coffee &amp; Wifi{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
  </head>
  <body class="bg-dark text-white">
    <nav class="navbar navbar-dark bg-black border-bottom border-secondary mb-4">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">☕ Coffee &amp; Wifi 💻</a>
        <div>
          <a class="btn btn-outline-warning btn-sm me-2" href="{{ url_for('home') }}">All Cafes</a>
          <a class="btn btn-warning btn-sm text-dark" href="{{ url_for('add_cafe') }}">Add Cafe</a>
        </div>
      </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
