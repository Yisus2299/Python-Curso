<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Book</title>
  </head>
  <body>
    <h1>Edit Book</h1>
    <form method="POST" action="{{ url_for('update', book_id=book_id) }}">
      <label for="book_name">Book Name</label>
      <input
        type="text"
        id="book_name"
        name="title"
        value="{{ book.title }}"
      />

      <label for="author">Book Author</label>
      <input
        type="text"
        id="author"
        name="author"
        value="{{ book.author }}"
      />

      <label for="rating">Rating</label>
      <input
        type="text"
        id="rating"
        name="rating"
        value="{{ book.rating }}"
      />

      <button type="submit">Save changes</button>
    </form>
    <a href="{{ url_for('home') }}">Go back to main page</a>
  </body>
</html>
